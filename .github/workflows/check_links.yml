name: Check Friend Links

# 触发规则：每2小时运行 + 手动触发
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

# 全局环境变量（GitHub 端）
env:
  TZ: Asia/Shanghai
  PYTHONIOENCODING: utf-8
  REMOTE_JSON_URL: ${{ vars.REMOTE_JSON_URL || 'https://www.liublog.cn/flink_count.json' }}
  CHECK_TIMEOUT: ${{ vars.CHECK_TIMEOUT || 10 }}
  MAX_WORKERS: ${{ vars.MAX_WORKERS || 3 }}
  RETRY_TIMES: ${{ vars.RETRY_TIMES || 1 }}

# 并发控制
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: 安装核心依赖
        run: |
          pip install --upgrade pip
          pip install requests==2.32.3 python-dotenv==1.0.1
          
      - name: 复制.env.example为.env
        run: cp .env.example .env || echo "无示例配置文件，使用默认参数"
          
      - name: 创建日志目录
        run: mkdir -p logs
          
      - name: 执行友链检测脚本
        run: python main.py
        continue-on-error: false
          
      - name: 推送检测结果到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if [ -f "./result.json" ]; then
              git add -f result.json
              git commit -m "🤖 自动更新友链检测结果: $(date +'%Y-%m-%d %H:%M:%S')" || git commit --amend --no-edit
              git push -f origin main
              echo "✅ 结果推送成功"
          else
              echo "❌ 未生成result.json"
              exit 1
          fi
          
      - name: 上传检测日志
        uses: actions/upload-artifact@v4
        with:
          name: flink-check-logs
          path: logs/
          retention-days: 7
